        var userAgent = navigator.userAgent || navigator.vendor; var android = keyLinkAndroid; var ios = keyLinkIOS;

        var mp4_l = keyVideoL;
        this.mp4_l = mp4_l;
        var mp4_p = keyVideoP;
        this.mp4_p = mp4_p;


        function clickthrough(e){
            e.preventDefault();
            ExitApi.exit()

        function updateVideoSrc() {
            const vid = document.getElementById('vid');
            const isPortrait = window.innerHeight > window.innerWidth;

            // if(isPortrait) {
            //     vid.style.objectFit = "contain"
            // } else {
            //     vid.style.objectFit = "cover"

            // }
            if (vid.src !== src) {
                vid.src = src;
                vid.style.display = "block";
                vid.play();
            }
        }
        window.addEventListener("resize", updateVideoSrc);
        window.addEventListener("load", updateVideoSrc);

    </script>
